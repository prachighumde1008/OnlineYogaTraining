<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Yoga AI</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
        }

        .login-container {
            display: flex;
            height: 100vh;
        }

        .login-image {
            flex: 1;
            background: linear-gradient(rgba(146, 100, 85, 0.4), rgba(34,49,63,0.4)),
                        url('https://i.pinimg.com/736x/d6/ad/de/d6adde1ca7d15d49cf8a77543c9fa6bd.jpg') no-repeat center/cover;
        }

        .login-form {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background:
                linear-gradient(rgba(247, 251, 249, 0.85), rgba(150, 107, 95, 0.85)),
                url('https://i.pinimg.com/736x/d3/0d/9a/d30d9a7a2bb380bf2c69064d1722b134.jpg') no-repeat center/cover;
        }

        .form-box {
            width: 360px;
            padding: 30px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        .form-box h2 {
            margin-bottom: 15px;
            color: #4f6f61;
            font-size: 22px;
        }

        .form-box input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #cfe3db;
            background-color: #f9fdfb;
            outline: none;
            box-sizing: border-box;
        }

        .form-box input:focus {
            border-color: #7fa998;
            box-shadow: 0 0 5px rgba(127,169,152,0.4);
        }

        .form-box button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(to right, #7fa998, #6c8f7a);
            color: white;
            cursor: pointer;
            margin-top: 10px;
            font-size: 16px;
        }

        .form-box p {
            margin-top: 12px;
            font-size: 14px;
        }

        .form-box a {
            color: #6c8f7a;
            text-decoration: none;
        }

        .form-box a:hover {
            text-decoration: underline;
        }

        #errorMsg {
            display: none;
            color: red;
            font-size: 14px;
            margin-top: 10px;
            font-weight: 600;
        }

        #successMsg {
            display: none;
            color: green;
            font-size: 14px;
            margin-top: 10px;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .login-container {
                flex-direction: column;
            }

            .login-image {
                height: 40vh;
            }

            .login-form {
                height: 60vh;
            }
        }
    </style>
</head>

<body>

    <div class="login-container">

        <div class="login-image"></div>

        <div class="login-form">
            <div class="form-box">
                <h2>Welcome Back 🌿</h2>

                <form onsubmit="loginUser(event)">
                    <input type="email" id="loginEmail" placeholder="Email Address" required>
                    <input type="password" id="loginPassword" placeholder="Password" required>
                    <button type="submit">Login</button>
                </form>

                <p id="successMsg">✅ Login successful!</p>
                <p id="errorMsg">❌ Invalid email or password</p>

                <p>Don't have an account?
                    <a href="register.html">Register</a>
                </p>
            </div>
        </div>

    </div>

    <script>
        function loginUser(event) {
            event.preventDefault();

            const email = document.getElementById("loginEmail").value.trim();
            const password = document.getElementById("loginPassword").value;

            const savedUser = JSON.parse(localStorage.getItem("yogaUser"));
            const errorMsg = document.getElementById("errorMsg");
            const successMsg = document.getElementById("successMsg");

            errorMsg.style.display = "none";
            successMsg.style.display = "none";

            if (!savedUser) {
                alert("No registered user found. Please register first.");
                window.location.href = "register.html";
                return;
            }

            if (email === savedUser.email && password === savedUser.password) {
                localStorage.setItem("isLoggedIn", "true");
                localStorage.setItem("loggedInUserName", savedUser.name);

                successMsg.style.display = "block";

                setTimeout(() => {
                    window.location.href = "dashboard/user-dashboard.html";
                }, 1500);
            } else {
                errorMsg.style.display = "block";
            }
        }
    </script>

</body>
</html>
