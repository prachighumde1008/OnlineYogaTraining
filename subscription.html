<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subscription - Yoga AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #9b8463;
}

.container {
    display: flex;
    min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    background: #5c4033;
    color: white;
    padding: 30px 20px;
    box-sizing: border-box;
}

.sidebar h2 {
    margin: 0 0 40px;
    font-size: 28px;
}

.sidebar a {
    display: block;
    color: white;
    text-decoration: none;
    margin: 25px 0;
    font-size: 18px;
}

/* MAIN */
.main {
    flex: 1;
    padding: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    background:
        linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25)),
        url('https://i.pinimg.com/736x/46/63/c9/4663c90d0c2b830fb31c060ae00ca721.jpg') no-repeat center/cover;
}

/* CARDS */
.plans {
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    width: 300px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 30px;
    text-align: center;
    color: white;
}

.price {
    font-size: 32px;
    font-weight: 600;
    margin: 15px 0;
}

.btn {
    padding: 12px 24px;
    border: none;
    border-radius: 25px;
    background: #7fa998;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

.btn:hover {
    opacity: 0.9;
}

.msg {
    margin-top: 20px;
    color: white;
    text-align: center;
}
</style>
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>Yoga AI</h2>
        <a href="dashboard/user-dashboard.html">Dashboard</a>
        <a href="pages/practice.html">Practice</a>
        <a href="pages/progress.html">Progress</a>
        <a href="pages/poses.html">Poses</a>
        <a href="pages/health_tips.html">Health Tips</a>
        <a href="pages/about.html">About</a>
        <a href="subscription.html">Subscription</a>
        <a href="pages/contact.html">Contact</a>
        <a href="index.html">Logout</a>
    </div>

    <!-- MAIN -->
    <div class="main">
        <div>
            <div class="plans">

                <div class="card">
                    <h2>Monthly Plan</h2>
                    <div class="price">₹499</div>
                    <p>Access premium yoga features for 1 month.</p>
                    <button class="btn" onclick="payNow('Monthly', 499)">Pay Now</button>
                </div>

                <div class="card">
                    <h2>Yearly Plan</h2>
                    <div class="price">₹2999</div>
                    <p>Access premium yoga features for 12 months.</p>
                    <button class="btn" onclick="payNow('Yearly', 2999)">Pay Now</button>
                </div>

            </div>

            <div class="msg" id="msg"></div>
        </div>
    </div>

</div>

<script>
function payNow(plan, amount) {
    const confirmPay = confirm(`Confirm demo payment of ₹${amount} for ${plan} Plan?`);
    if (!confirmPay) return;

    localStorage.setItem("subscriptionStatus", "active");
    localStorage.setItem("subscriptionPlan", plan);
    localStorage.setItem("paymentDate", new Date().toLocaleString());

    document.getElementById("msg").innerHTML =
        `✅ Payment Successful!<br>${plan} Plan Activated`;

    setTimeout(() => {
        window.location.href = "dashboard/user-dashboard.html";
    }, 2000);
}
</script>

</body>
</html>
