<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Yoga AI</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
        }

        .register-container {
            display: flex;
            height: 100vh;
        }

        /* LEFT SIDE IMAGE */
        .register-image {
            flex: 1;
            background: linear-gradient(rgba(146, 100, 85, 0.4), rgba(34,49,63,0.4)),
                        url('https://i.pinimg.com/736x/d6/ad/de/d6adde1ca7d15d49cf8a77543c9fa6bd.jpg') no-repeat center/cover;
        }

        /* RIGHT SIDE WITH BACKGROUND IMAGE */
        .register-form {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;

            background: 
                linear-gradient(rgba(247, 251, 249, 0.85), rgba(150, 107, 95, 0.85)),
                url('https://i.pinimg.com/736x/d3/0d/9a/d30d9a7a2bb380bf2c69064d1722b134.jpg') no-repeat center/cover;
        }

        /* FORM BOX */
        .form-box {
            width: 360px;
            padding: 30px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        .form-box img {
            width: 90px;
            margin-bottom: 10px;
            border-radius: 50%;
        }

        .form-box h2 {
            margin-bottom: 15px;
            color: #4f6f61;
        }

        .form-box input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #cfe3db;
            background-color: #f9fdfb;
            outline: none;
            transition: 0.3s;
        }

        .form-box input:focus {
            border-color: #7fa998;
            box-shadow: 0 0 5px rgba(127,169,152,0.4);
        }

        .form-box button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(to right, #7fa998, #6c8f7a);
            color: white;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .form-box button:hover {
            transform: scale(1.03);
        }

        .form-box p {
            margin-top: 12px;
            font-size: 14px;
        }

        .form-box a {
            color: #6c8f7a;
            text-decoration: none;
        }

        .form-box a:hover {
            text-decoration: underline;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .register-container {
                flex-direction: column;
            }

            .register-image {
                height: 40vh;
            }

            .register-form {
                height: 60vh;
            }
        }
    </style>
</head>

<body>

    <div class="register-container">

        <!-- LEFT SIDE -->
        <div class="register-image"></div>

        <!-- RIGHT SIDE -->
        <div class="register-form">
            <div class="form-box">

                <!-- IMAGE -->
                <img src="images/yoga-icon.jpg" alt="Yoga">

                <h2>Create Account 🌿</h2>

                <form>
                    <input type="text" placeholder="Full Name" required>
                    <input type="email" placeholder="Email Address" required>
                    <input type="password" placeholder="Password" required>
                    <input type="password" placeholder="Confirm Password" required>

                    <button type="submit">Register</button>
                </form>

                <p>Already have an account? 
                    <a href="login.html">Login</a>
                </p>

            </div>
        </div>

    </div>

</body>
</html>
