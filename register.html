<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Yoga AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
(function () {
    emailjs.init({
        publicKey: "yiDZL_X9SG7FawVyC"
    });
})();
</script>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: 'Poppins', sans-serif;
}

.register-container {
    display: flex;
    height: 100vh;
}

.register-image {
    flex: 1;
    background:
        linear-gradient(rgba(146, 100, 85, 0.4), rgba(34,49,63,0.4)),
        url('https://i.pinimg.com/736x/d6/ad/de/d6adde1ca7d15d49cf8a77543c9fa6bd.jpg') no-repeat center/cover;
}

.register-form {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    background:
        linear-gradient(rgba(247, 251, 249, 0.85), rgba(150, 107, 95, 0.85)),
        url('https://i.pinimg.com/736x/d3/0d/9a/d30d9a7a2bb380bf2c69064d1722b134.jpg') no-repeat center/cover;
}

.form-box {
    width: 360px;
    padding: 30px;
    border-radius: 15px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(10px);
    text-align: center;
    box-sizing: border-box;
}

.form-box h2 {
    color: #4f6f61;
}

.form-box input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: none;
    box-sizing: border-box;
}

.form-box button {
    width: 100%;
    padding: 12px;
    border-radius: 25px;
    border: none;
    background: #7fa998;
    color: white;
    cursor: pointer;
}

#msg {
    margin-top: 10px;
    font-weight: bold;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="register-container">
    <div class="register-image"></div>

    <div class="register-form">
        <div class="form-box">
            <h2>Create Account 🌿</h2>

            <form onsubmit="registerUser(event)">
                <input type="text" id="name" placeholder="Full Name" required>
                <input type="email" id="email" placeholder="Email Address" required>
                <input type="password" id="password" placeholder="Password" required>
                <input type="password" id="confirm" placeholder="Confirm Password" required>
                <button type="submit">Register</button>
            </form>

            <p id="msg"></p>
        </div>
    </div>
</div>

<script>
async function registerUser(e) {
    e.preventDefault();

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim().toLowerCase();
    let password = document.getElementById("password").value;
    let confirm = document.getElementById("confirm").value;
    let msg = document.getElementById("msg");

    if (password !== confirm) {
        msg.innerText = "❌ Passwords do not match";
        return;
    }

    // Save user first
    localStorage.setItem("yogaUser", JSON.stringify({
        name: name,
        email: email,
        password: password
    }));

    msg.innerText = "✅ Registration saved. Sending email...";

    try {
        await emailjs.send("service_y2xqluw", "template_yyrv24s", {
            name: name,
            email: email
        });

        msg.innerText = "✅ Registration successful!";
    } catch (error) {
        console.error("EmailJS register error:", error);
        msg.innerText = "✅ Registration successful! Email could not be sent.";
    }

    setTimeout(() => {
        window.location.href = "login.html";
    }, 1500);
}
</script>

</body>
</html>
