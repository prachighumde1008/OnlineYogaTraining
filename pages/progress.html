<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Progress - Yoga AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 240px;
    height: 100vh;
    background: linear-gradient(180deg, #5c4033, #3e2a21);
    color: white;
    padding: 20px;
    position: fixed;
}

.sidebar h2 {
    text-align: center;
}

.sidebar a {
    display: block;
    color: white;
    padding: 12px;
    margin: 10px 0;
    text-decoration: none;
    border-radius: 10px;
    transition: 0.3s;
}

.sidebar a:hover {
    background: rgba(255,255,255,0.2);
}

/* MAIN */
.main {
    margin-left: 240px;
    width: calc(100% - 240px);
    min-height: 100vh;
    background: url('https://i.pinimg.com/736x/14/10/91/1410915e9a8d21316ffd07211646103b.jpg') no-repeat center;
    background-size: cover;
    padding: 40px;
}

/* GLASS CARD */
.overlay {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}

/* TITLE */
h1 {
    text-align: center;
    color: white;
    margin-bottom: 20px;
}

/* WEEK BUTTONS */
.week {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 25px;
}

.day {
    padding: 10px 18px;
    border-radius: 20px;
    background: rgba(255,255,255,0.2);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.day:hover {
    background: #7fa998;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    overflow: hidden;
    border-radius: 15px;
}

thead {
    background: #7fa998;
    color: white;
}

th, td {
    padding: 14px;
    text-align: center;
}

tbody tr {
    background: rgba(255,255,255,0.15);
    color: white;
    transition: 0.3s;
}

tbody tr:hover {
    background: rgba(255,255,255,0.3);
}

/* POSE BADGE */
.pose-name {
    background: linear-gradient(45deg, #7fa998, #a8d5ba);
    padding: 6px 12px;
    border-radius: 15px;
    color: white;
    font-weight: 500;
}

/* EMPTY */
.empty {
    text-align: center;
    padding: 20px;
    color: #eee;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>Yoga AI</h2>
    <a href="../dashboard/user-dashboard.html">Dashboard</a>
    <a href="practice.html">Practice</a>
    <a href="progress.html">Progress</a>
    <a href="poses.html">Poses</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="logout.html">Logout</a>
</div>

<!-- MAIN -->
<div class="main">
<div class="overlay">

<h1>🌿 Your Practice Journey</h1>

<!-- WEEK FILTER -->
<div class="week">
    <div class="day" onclick="filterDay(1)">Mon</div>
    <div class="day" onclick="filterDay(2)">Tue</div>
    <div class="day" onclick="filterDay(3)">Wed</div>
    <div class="day" onclick="filterDay(4)">Thu</div>
    <div class="day" onclick="filterDay(5)">Fri</div>
    <div class="day" onclick="filterDay(6)">Sat</div>
    <div class="day" onclick="filterDay(0)">Sun</div>
    <div class="day" onclick="showAll()">All</div>
</div>

<!-- TABLE -->
<table>
    <thead>
        <tr>
            <th>🧘 Pose</th>
            <th>🎯 Accuracy</th>
            <th>📅 Date</th>
        </tr>
    </thead>
    <tbody id="dataTable"></tbody>
</table>

</div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("yogaProgress")) || [];

const table = document.getElementById("dataTable");

/* SHOW ALL */
function showAll(){
    showData(data);
}

/* DISPLAY DATA */
function showData(list){

    table.innerHTML = "";

    if(list.length === 0){
        table.innerHTML = `<tr><td colspan="3" class="empty">No practice data yet 🧘‍♀️</td></tr>`;
        return;
    }

    list.slice().reverse().forEach(item=>{
        table.innerHTML += `
        <tr>
            <td><span class="pose-name">🧘 ${item.pose}</span></td>
            <td>${item.score}%</td>
            <td>${new Date(item.date).toLocaleString()}</td>
        </tr>
        `;
    });
}

/* FILTER BY DAY */
function filterDay(day){

    let filtered = data.filter(item=>{
        return new Date(item.date).getDay() === day;
    });

    showData(filtered);
}

/* LOAD */
showAll();

</script>

</body>
</html>
