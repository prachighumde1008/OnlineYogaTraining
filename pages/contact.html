<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Yoga AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
(function () {
    emailjs.init({
        publicKey: "yiDZL_X9SG7FawVyC"
    });
})();
</script>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;

    background:
        linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
        url('https://i.pinimg.com/1200x/c5/e3/f1/c5e3f13871af024526dcf46ca82de410.jpg')
        no-repeat center center/cover;
}   

.container {
    display: flex;
    min-height: 100vh;
}

.sidebar {
    width: 220px;
    background: #5c4033;
    color: white;
    padding: 30px 20px;
}

.sidebar h2 {
    margin-bottom: 40px;
}

.sidebar a {
    display: block;
    color: white;
    text-decoration: none;
    margin: 25px 0;
    font-size: 22px;
}

.main {
    flex: 1;
    padding: 30px;
    color: white;
}

.contact-box {
    background: rgba(255,255,255,0.15);
    padding: 25px;
    border-radius: 15px;
    max-width: 600px;
    margin: auto;
}

input, textarea {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
}

button {
    padding: 12px 25px;
    border-radius: 20px;
    border: none;
    background: #7fa998;
    color: white;
    cursor: pointer;
}

#successMsg {
    display: none;
    color: lightgreen;
}

#errorMsg {
    display: none;
    color: red;
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
    <h2>Yoga AI</h2>
    <a href="../dashboard/user-dashboard.html">Dashboard</a>
    <a href="practice.html">Practice</a>
    <a href="progress.html">Progress</a>
    <a href="poses.html">Poses</a>
    <a href="health_tips.html">Health Tips</a>
    <a href="about.html">About</a>
    <a href="../subscription.html">Subscription</a>
    <a href="contact.html">Contact</a>
    <a href="logout.html">Logout</a>
</div>

<div class="main">

    <h1>Contact Us</h1>

    <div class="contact-box">

        <form onsubmit="sendMessage(event)">

            <input type="text" id="name" placeholder="Your Name" required>
            <input type="email" id="email" placeholder="Your Email" required>
            <textarea id="message" placeholder="Your Message" required></textarea>

            <button type="submit">Send Message</button>

            <p id="successMsg">✅ Message sent successfully!</p>
            <p id="errorMsg">❌ Failed to send message</p>

        </form>

    </div>

</div>

</div>

<script>
function sendMessage(e) {
    e.preventDefault();

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let message = document.getElementById("message").value;

    emailjs.send("service_y2xqluw", "template_eynrlt8", {
        name: name,
        email: email,
        message: message
    })
    .then(function() {
        document.getElementById("successMsg").style.display = "block";
        document.getElementById("errorMsg").style.display = "none";
    })
    .catch(function(error) {
        document.getElementById("errorMsg").style.display = "block";
    });
}
</script>

</body>
</html>
